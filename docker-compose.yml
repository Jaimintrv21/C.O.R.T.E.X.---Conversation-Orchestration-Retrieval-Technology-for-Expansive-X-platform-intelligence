services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: cortex-web
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok ? 0 : 1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cortex-api
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      C.O.R.T.E.X._ENVIRONMENT: production
      C.O.R.T.E.X._ALLOWED_ORIGINS: '["http://localhost:3000","https://localhost"]'
      C.O.R.T.E.X._REDIS_URL: redis://redis:6379/0
      C.O.R.T.E.X._CELERY_BROKER_URL: redis://redis:6379/1
      C.O.R.T.E.X._CELERY_RESULT_BACKEND: redis://redis:6379/2
      C.O.R.T.E.X._MEILISEARCH_URL: http://search:7700
      C.O.R.T.E.X._MINIO_ENDPOINT: storage:9000
      C.O.R.T.E.X._OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      search:
        condition: service_healthy
      storage:
        condition: service_healthy
      ollama:
        condition: service_healthy

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cortex-worker
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      C.O.R.T.E.X._ENVIRONMENT: production
      C.O.R.T.E.X._REDIS_URL: redis://redis:6379/0
      C.O.R.T.E.X._CELERY_BROKER_URL: redis://redis:6379/1
      C.O.R.T.E.X._CELERY_RESULT_BACKEND: redis://redis:6379/2
      C.O.R.T.E.X._MEILISEARCH_URL: http://search:7700
      C.O.R.T.E.X._MINIO_ENDPOINT: storage:9000
      C.O.R.T.E.X._OLLAMA_BASE_URL: http://ollama:11434
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,embeddings,analytics,artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      search:
        condition: service_healthy
      storage:
        condition: service_healthy
      ollama:
        condition: service_healthy

  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cortex-beat
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      C.O.R.T.E.X._ENVIRONMENT: production
      C.O.R.T.E.X._REDIS_URL: redis://redis:6379/0
      C.O.R.T.E.X._CELERY_BROKER_URL: redis://redis:6379/1
      C.O.R.T.E.X._CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: celery -A app.workers.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    container_name: cortex-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cortex}
      POSTGRES_USER: ${POSTGRES_USER:-cortex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cortex}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortex} -d ${POSTGRES_DB:-cortex}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: cortex-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--appendfsync", "everysec"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  search:
    image: getmeili/meilisearch:v1.10
    container_name: cortex-search
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-change-me}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7700/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  storage:
    image: minio/minio:latest
    container_name: cortex-storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cortex}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2
    container_name: cortex-caddy
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: cortex-ollama
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:11434/api/tags >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.1.1
    container_name: cortex-loki
    profiles: ["observability"]
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./infra/monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: cortex-prometheus
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: cortex-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: cortex-jaeger
    profiles: ["observability"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

volumes:
  pgdata:
  redisdata:
  meili_data:
  minio_data:
  caddy_data:
  caddy_config:
  ollama_models:
  loki_data:
  prometheus_data:
  grafana_data:
